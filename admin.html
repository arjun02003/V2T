        // IndexedDB / Firebase Hybrid Manager
        class AdminDBManager {
            constructor() {
                this.dbName = 'v2t_groups_cms';
                this.db = null;
                this.dbRef = null;
                this.useFirebase = false;
            }

            init() {
                return new Promise((resolve, reject) => {
                    // Check if Firebase config is set up
                    if (window.FIREBASE_CONFIG && window.FIREBASE_CONFIG.databaseURL) {
                        try {
                            // Guard: prevent "app already exists" error on re-init
                            if (!window.firebase.apps.length) {
                                window.firebase.initializeApp(window.FIREBASE_CONFIG);
                            }
                            this.dbRef = window.firebase.database().ref();
                            this.useFirebase = true;
                            console.log('%c[V2T Admin] Firebase Realtime DB connected ✅', 'color: #00f0ff; font-weight: bold;');
                            resolve();
                            return;
                        } catch (e) {
                            console.error("[V2T Admin] Firebase init failed, falling back to IndexedDB:", e);
                        }
                    } else {
                        console.warn("[V2T Admin] No Firebase config — using local IndexedDB.");
                    }


                    const request = indexedDB.open(this.dbName, 3); // Upgraded to v3 to support price overrides
                    request.onblocked = () => {
                        console.warn("Database upgrade blocked by another open tab.");
                        alert("Database upgrade is blocked by another open tab of this website. Please close other tabs of V2T Groups and refresh this page to complete the upgrade.");
                    };
                    request.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains('portfolio_items')) {
                            const store = db.createObjectStore('portfolio_items', { keyPath: 'id', autoIncrement: true });
                            store.createIndex('category', 'category', { unique: false });
                        }
                        if (!db.objectStoreNames.contains('deleted_static_items')) {
                            db.createObjectStore('deleted_static_items', { keyPath: 'cardId' });
                        }
                        if (!db.objectStoreNames.contains('overridden_prices')) {
                            db.createObjectStore('overridden_prices', { keyPath: 'itemId' });
                        }
                    };
                    request.onsuccess = (e) => {
                        this.db = e.target.result;
                        this.db.onversionchange = () => {
                            this.db.close();
                            location.reload();
                        };
                        resolve();
                    };
                    request.onerror = (e) => reject(e.target.error);
                });
            }

            getCustomItems(category) {
                if (this.useFirebase) {
                    return new Promise((resolve, reject) => {
                        this.dbRef.child('portfolio_items').once('value', (snapshot) => {
                            const val = snapshot.val();
                            if (!val) {
                                resolve([]);
                                return;
                            }
                            const items = Object.keys(val).map(key => ({
                                id: key,
                                ...val[key]
                            })).filter(x => x.category === category);
                            resolve(items);
                        }, reject);
                    });
                }

                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction('portfolio_items', 'readonly');
                    const store = transaction.objectStore('portfolio_items');
                    const index = store.index('category');
                    const request = index.getAll(category);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            addCustomItem(item) {
                if (this.useFirebase) {
                    return new Promise((resolve, reject) => {
                        const newRef = this.dbRef.child('portfolio_items').push();
                        newRef.set({
                            category: item.category,
                            src: item.src,
                            title: item.title,
                            desc: item.desc,
                            price: item.price
                        }, (err) => {
                            if (err) reject(err);
                            else resolve(newRef.key);
                        });
                    });
                }

                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction('portfolio_items', 'readwrite');
                    const store = transaction.objectStore('portfolio_items');
                    const request = store.add(item);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            deleteCustomItem(id) {
                if (this.useFirebase) {
                    return new Promise((resolve, reject) => {
                        this.dbRef.child(`portfolio_items/${id}`).remove((err) => {
                            if (err) reject(err);
                            else resolve();
                        });
                    });
                }

                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction('portfolio_items', 'readwrite');
                    const store = transaction.objectStore('portfolio_items');
                    const request = store.delete(id);
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            }

            getDeletedStaticIds() {
                if (this.useFirebase) {
                    return new Promise((resolve, reject) => {
                        this.dbRef.child('deleted_static_items').once('value', (snapshot) => {
                            const val = snapshot.val();
                            if (!val) {
                                resolve([]);
                                return;
                            }
                            resolve(Object.keys(val));
                        }, reject);
                    });
                }

                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction('deleted_static_items', 'readonly');
                    const store = transaction.objectStore('deleted_static_items');
                    const request = store.getAll();
                    request.onsuccess = () => resolve(request.result.map(x => x.cardId));
                    request.onerror = () => reject(request.error);
                });
            }

            hideStaticItem(cardId, category) {
                if (this.useFirebase) {
                    return new Promise((resolve, reject) => {
                        this.dbRef.child(`deleted_static_items/${cardId}`).set(category, (err) => {
                            if (err) reject(err);
                            else resolve();
                        });
                    });
                }

                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction('deleted_static_items', 'readwrite');
                    const store = transaction.objectStore('deleted_static_items');
                    const request = store.put({ cardId, category });
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            }

            restoreStaticItem(cardId) {
                if (this.useFirebase) {
                    return new Promise((resolve, reject) => {
                        const p1 = this.dbRef.child(`deleted_static_items/${cardId}`).remove();
                        const p2 = this.dbRef.child(`overridden_prices/${cardId}`).remove();
                        Promise.all([p1, p2]).then(() => resolve(), reject);
                    });
                }

                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction('deleted_static_items', 'readwrite');
                    const store = transaction.objectStore('deleted_static_items');
                    const request = store.delete(cardId);
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            }

            getOverriddenPrices() {
                if (this.useFirebase) {
                    return new Promise((resolve, reject) => {
                        this.dbRef.child('overridden_prices').once('value', (snapshot) => {
                            const val = snapshot.val();
                            if (!val) {
                                resolve([]);
                                return;
                            }
                            const list = Object.keys(val).map(key => ({
                                itemId: key,
                                price: val[key]
                            }));
                            resolve(list);
                        }, reject);
                    });
                }

                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction('overridden_prices', 'readonly');
                    const store = transaction.objectStore('overridden_prices');
                    const request = store.getAll();
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            savePriceOverride(itemId, price) {
                if (this.useFirebase) {
                    return new Promise((resolve, reject) => {
                        this.dbRef.child(`overridden_prices/${itemId}`).set(price, (err) => {
                            if (err) reject(err);
                            else resolve();
                        });
                    });
                }

                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction('overridden_prices', 'readwrite');
                    const store = transaction.objectStore('overridden_prices');
                    const request = store.put({ itemId, price });
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            }

            uploadToStorage(file) {
                return new Promise((resolve, reject) => {
                    if (!this.useFirebase) {
                        resolve(null);
                        return;
                    }
                    const ext = file.name.split('.').pop();
                    const fileName = `gallery/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
                    const storageRef = window.firebase.storage().ref(fileName);
                    const uploadTask = storageRef.put(file);
                    uploadTask.on('state_changed',
                        null,
                        (err) => reject(err),
                        async () => {
                            const url = await uploadTask.snapshot.ref.getDownloadURL();
                            resolve(url);
                        }
                    );
                });
            }
        }

        // Render items list table
        async function renderItems() {

            const staticList = staticItems[currentTabCategory];

            const deletedStaticIds = await db.getDeletedStaticIds();

            // Fetch price overrides
            const overriddenPricesList = await db.getOverriddenPrices();
            const overriddenPricesMap = {};
            overriddenPricesList.forEach(x => {
                overriddenPricesMap[x.itemId] = x.price;
            });

            // 1. Render Static Items
            staticList.forEach(item => {

                        </div>
                    </td>
                    <td style="text-align: right;">
                        ${isHidden 
                            ? `<button class="btn-admin-action btn-restore" onclick="restoreStatic('${item.id}')">Show</button>` 
                            : `<button class="btn-admin-action btn-delete" onclick="hideStatic('${item.id}')">Hide</button>`
                        }
                    </td>
                `;
                listTable.appendChild(tr);
            });

            // 2. Render Custom Items
            customList.forEach(item => {
                const cardId = `custom-card-${item.id}`;
                const displayedPrice = overriddenPricesMap[cardId] || item.price;
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>
                        <div class="admin-thumb-container">
                            <img src="${item.src}" alt="${item.title}" class="admin-thumb">
                        </div>
                    </td>
                    <td>
                        <div class="admin-item-title">${item.title}</div>
                        <div style="font-size: 0.75rem; color: var(--text-secondary); max-width: 320px; text-overflow: ellipsis; overflow: hidden; white-space: nowrap;">
                            ${item.desc}
                        </div>
                    </td>
                    <td>
                        <span class="admin-item-type-badge badge-custom">UPLOADED</span>
                    </td>
                    <td>
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <span class="admin-price-val">${displayedPrice}</span>
                            <button class="btn-admin-action" onclick="editPrice('${cardId}', '${displayedPrice}')" style="padding: 2px 6px; font-size: 0.65rem;">Edit</button>
                        </div>
                    </td>
                    <td style="text-align: right;">
                        <button class="btn-admin-action btn-delete" onclick="deleteCustom('${item.id}')">Delete</button>
                    </td>
                `;
                listTable.appendChild(tr);
            });

            if (staticList.length === 0 && customList.length === 0) {
                listTable.innerHTML = `<tr><td colspan="5" class="empty-state-text">No items active in this sector.</td></tr>`;
            }
        }

        // Actions: Edit price
        window.editPrice = async function(itemId, currentPrice) {
            const newPrice = prompt(`Enter new price for this item:`, currentPrice);
            if (newPrice !== null && newPrice.trim() !== "") {
                try {
                    await db.savePriceOverride(itemId, newPrice.trim());
                    await renderItems();
                } catch (err) {
                    console.error("Failed to override price:", err);
                    alert("Error saving price. Try again.");
                }
            }
        };

        // Actions: Hide static
        window.hideStatic = async function(cardId) {
            if (confirm("Are you sure you want to hide this default card from the public gallery?")) {
                await db.hideStaticItem(cardId, currentTabCategory);
                await renderItems();
            }
        };

        // Actions: Restore static
        window.restoreStatic = async function(cardId) {
            await db.restoreStaticItem(cardId);
            await renderItems();
        };

        // Actions: Delete custom
        window.deleteCustom = async function(id) {
            if (confirm("Are you sure you want to permanently delete this uploaded item?")) {
                await db.deleteCustomItem(id);
                // Also clean up its price override if any
                const cardId = `custom-card-${id}`;
                await db.restoreStaticItem(cardId); // Deletes from overrides as they share key structure
                await renderItems();
            }
        };

        // Setup Form Upload
        function setupForm() {
            const form = document.getElementById('admin-upload-form');
            const dropzone = document.getElementById('dropzone');
            const fileInput = document.getElementById('input-file');
            const previewContainer = document.getElementById('preview-container');
            const previewImg = document.getElementById('preview-img');
            const dropzoneText = document.getElementById('dropzone-text');
            
            let base64Image = null;
            let selectedFile = null;

            if (!dropzone || !fileInput || !form) return;

            dropzone.addEventListener('click', () => fileInput.click());

            fileInput.addEventListener('change', (e) => {
                handleFile(e.target.files[0]);
            });

            dropzone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropzone.style.borderColor = 'var(--neon-cyan)';
            });

            dropzone.addEventListener('dragleave', () => {
                dropzone.style.borderColor = 'rgba(255,255,255,0.1)';
            });

            dropzone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropzone.style.borderColor = 'rgba(255,255,255,0.1)';
                handleFile(e.dataTransfer.files[0]);
            });

            function handleFile(file) {
                if (!file || !file.type.startsWith('image/')) {
                    alert("Please select a valid image file.");
                    return;
                }

                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        
                        // Limit maximum dimension to 800px for optimal performance and size
                        const maxDim = 800;
                        if (width > maxDim || height > maxDim) {
                            if (width > height) {
                                height = Math.round((height * maxDim) / width);
                                width = maxDim;
                            } else {
                                width = Math.round((width * maxDim) / height);
                                height = maxDim;
                            }
                        }
                        
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        // Compress to JPEG format at 0.75 quality (highly optimized base64)
                        base64Image = canvas.toDataURL('image/jpeg', 0.75);
                        previewImg.src = base64Image;
                        previewContainer.style.display = 'block';
                        dropzoneText.style.display = 'none';
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            }

            function resetForm() {
                form.reset();
                base64Image = null;
                selectedFile = null;
                previewContainer.style.display = 'none';
                dropzoneText.style.display = 'block';
                previewImg.src = '';
            }

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                if (!base64Image) {
                    alert("Please upload or drag an image first.");
                    return;
                }

                const title = document.getElementById('input-title').value.trim();
                const price = document.getElementById('input-price').value.trim();
                const desc = document.getElementById('input-desc').value.trim();

                const submitBtn = document.getElementById('btn-submit-upload');
                submitBtn.disabled = true;
                submitBtn.textContent = 'Saving...';

                try {
                    const newItem = {
                        category: currentTabCategory,
                        src: base64Image, // Storing highly compressed base64 directly
                        title: title,
                        price: price,
                        desc: desc
                    };

                    await db.addCustomItem(newItem);
                    resetForm();
                    await renderItems();
                    alert("Successfully added to gallery!");
                } catch (err) {
                    console.error("Failed to add custom item:", err);
                    alert("Error saving item: " + (err.message || err));
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Add to Gallery';
                }
            });
        }

        // Initialize page login checks
        checkLogin();
    </script>
    <!-- Canvas background & interactions script -->
    <script src="js/main.js?v=1.5"></script>
</body>
</html>
